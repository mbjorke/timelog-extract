# CI for timelog-extract. PR titles and descriptions must be in English (see AGENTS.md
# and .github/pull_request_template.md); this workflow does not auto-detect language.
name: CI

on:
  push:
  pull_request:

jobs:
  python:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
      - name: Smoke run
        run: |
          python timelog_extract.py --today --screen-time off --source-summary || true
      - name: Enforce Python file line limit
        run: |
          python scripts/check_file_lengths.py --max-lines 500
      - name: Run unit tests
        run: |
          bash scripts/run_autotests.sh

  extension:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cursor-extension
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: npm install
      - name: Build extension
        run: npm run build
