# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Production: deploy only from the default branch (gittan.sh / Pages)
  push:
    branches: ["main"]

  # PRs: verify the static bundle builds; does NOT publish (avoids overwriting production).
  pull_request:
    branches: ["main"]
    paths:
      - "gittan.html"
      - "favicon.ico"
      - "og-image.png"
      - "gittan-logo.png"
      - "CNAME"
      - ".github/workflows/static.yml"

  # Re-run deploy from Actions after merge if needed (same commit as main)
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Green check on PRs; GitHub may still show "not deployed" on the branch — see docs/CI.md
  verify-static-site:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare static site artifact (same as production)
        run: |
          set -euo pipefail
          mkdir -p _site
          if [ ! -f "gittan.html" ]; then
            echo "No landing page file found (expected gittan.html)." >&2
            exit 1
          fi
          cp "gittan.html" _site/index.html
          if [ -f "favicon.ico" ]; then
            cp "favicon.ico" _site/favicon.ico
          fi
          if [ -f "og-image.png" ]; then
            cp "og-image.png" _site/og-image.png
          fi
          if [ -f "gittan-logo.png" ]; then
            cp "gittan-logo.png" _site/gittan-logo.png
          fi
          if [ -f CNAME ]; then
            cp CNAME _site/CNAME
          fi
          test -f _site/index.html

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare static site artifact
        run: |
          set -euo pipefail
          mkdir -p _site
          if [ ! -f "gittan.html" ]; then
            echo "No landing page file found (expected gittan.html)." >&2
            exit 1
          fi
          cp "gittan.html" _site/index.html
          if [ -f "favicon.ico" ]; then
            cp "favicon.ico" _site/favicon.ico
          fi
          if [ -f "og-image.png" ]; then
            cp "og-image.png" _site/og-image.png
          fi
          if [ -f "gittan-logo.png" ]; then
            cp "gittan-logo.png" _site/gittan-logo.png
          fi
          if [ -f CNAME ]; then
            cp CNAME _site/CNAME
          fi
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only publish-ready static site output
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
