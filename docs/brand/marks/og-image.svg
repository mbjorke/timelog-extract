<svg viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Grid pattern -->
    <pattern id="grid" width="64" height="64" patternUnits="userSpaceOnUse">
      <path d="M 64 0 L 0 0 0 64" fill="none" stroke="#3c83f6" stroke-width="0.6"/>
    </pattern>
    <!-- Fade mask for grid -->
    <radialGradient id="grid-fade" cx="35%" cy="50%" r="55%">
      <stop offset="0%" stop-color="white" stop-opacity="1"/>
      <stop offset="100%" stop-color="white" stop-opacity="0"/>
    </radialGradient>
    <mask id="grid-mask">
      <rect width="1200" height="630" fill="url(#grid-fade)"/>
    </mask>
    <!-- Glow gradients -->
    <radialGradient id="glow-bee" cx="28%" cy="50%" r="28%">
      <stop offset="0%" stop-color="#f5cc47" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#f5cc47" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-berry" cx="48%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#3c83f6" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3c83f6" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0c1119"/>

  <!-- Grid overlay -->
  <rect width="1200" height="630" fill="url(#grid)" mask="url(#grid-mask)" opacity="0.08"/>

  <!-- Glow behind marks -->
  <rect width="1200" height="630" fill="url(#glow-bee)"/>
  <rect width="1200" height="630" fill="url(#glow-berry)"/>

  <!-- Bee mark — size=190, x=75, y=220 (centered at y=315) -->
  <svg x="75" y="220" width="190" height="190" viewBox="0 0 32 32">
    <ellipse cx="9" cy="11" rx="5" ry="3.5" fill="#bedafe" opacity="0.9"/>
    <ellipse cx="23" cy="11" rx="5" ry="3.5" fill="#bedafe" opacity="0.9"/>
    <ellipse cx="16" cy="18" rx="9" ry="8" fill="#f5cc47"/>
    <path d="M16 26c4.5 0 8.5-3 9-7-1 4-5 6-9 6-2 0-4-.6-5.5-1.7C12 25 14 26 16 26z" fill="#e1a52d"/>
    <rect x="9" y="14.5" width="14" height="2.2" rx="1" fill="#212936"/>
    <rect x="9" y="19.5" width="14" height="2.2" rx="1" fill="#212936"/>
    <circle cx="20" cy="16.5" r="1.1" fill="#212936"/>
    <path d="M13 11.5l-1.5-3M19 11.5l1.5-3" stroke="#212936" stroke-width="1.2" stroke-linecap="round"/>
  </svg>

  <!-- Blueberry mark — overlap 190*0.18=34px → x=75+190-34=231 -->
  <svg x="231" y="220" width="190" height="190" viewBox="0 0 32 32">
    <circle cx="16" cy="17" r="10" fill="#3c83f6"/>
    <ellipse cx="12.5" cy="13" rx="2.6" ry="1.7" fill="white" opacity="0.5"/>
    <path d="M22 22c0 3-3 5-6 5s-6-2-6-5c1.5 2 3.5 3 6 3s4.5-1 6-3z" fill="#1e3a6e" opacity="0.5"/>
    <path d="M13 7.5l1.6 1.6L16 7.5l1.4 1.6L19 7.5v2.2c0 .9-1.3 1.7-3 1.7s-3-.8-3-1.7V7.5z" fill="#212936"/>
  </svg>

  <!-- Wordmark: "gittan" -->
  <text
    x="510" y="308"
    font-family="Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="800"
    font-size="88"
    letter-spacing="-2"
    fill="#f0eefc"
  >gittan</text>

  <!-- ".sh" dimmed suffix -->
  <text
    x="823" y="308"
    font-family="Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="500"
    font-size="88"
    letter-spacing="-2"
    fill="#4a4560"
  >.sh</text>

  <!-- Tagline -->
  <text
    x="512" y="374"
    font-family="Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="400"
    font-size="22"
    letter-spacing="0.2"
    fill="#8b849e"
  >Local-first time logging for AI-era teams</text>

  <!-- Bottom accent line -->
  <line x1="510" y1="410" x2="980" y2="410" stroke="#252338" stroke-width="1"/>
  <text
    x="512" y="432"
    font-family="Montserrat, 'Helvetica Neue', Helvetica, Arial, sans-serif"
    font-weight="500"
    font-size="14"
    letter-spacing="1.5"
    fill="#4a4560"
  >PRIVATE BETA · DESIGN PARTNERS ONLY</text>
</svg>
