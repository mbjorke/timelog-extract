# Simple workflow for deploying static content to GitHub Pages
name: Deploy static content to Pages

on:
  # Production: deploy only from the default branch (gittan.sh / Pages)
  push:
    branches: ["main"]

  # PRs: verify the static bundle builds; does NOT publish (avoids overwriting production).
  pull_request:
    branches: ["main"]
    paths:
      - "gittan.html"
      - "favicon.ico"
      - "og-image.png"
      - "gittan-logo.png"
      - "CNAME"
      - ".github/workflows/static.yml"
      - "scripts/prepare_static_site.sh"

  # Re-run deploy from Actions after merge if needed (same commit as main)
  workflow_dispatch:

# Default: read-only. Pages + OIDC only on the deploy job.
permissions:
  contents: read

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Green check on PRs; GitHub may still show "not deployed" on the branch — see docs/runbooks/ci.md
  verify-static-site:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Prepare static site artifact
        run: bash scripts/prepare_static_site.sh

  deploy:
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Pages
        uses: actions/configure-pages@v5
      - name: Prepare static site artifact
        run: bash scripts/prepare_static_site.sh
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Upload only publish-ready static site output
          path: '_site'
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
